# ==============================================================================
# TradeXYZ 测试用网格配置（固定范围做多）
# ==============================================================================
#
# 🧪 测试目的：验证固定范围网格是否正确挂单及成交
#
# 📌 测试策略：
#    - grid_interval 设较大（$5.0），使订单不容易成交
#    - order_amount 设最小值，即使意外成交损失也极小
#    - 观察重点：网格是否在固定价格范围内正确挂单
#
# ==============================================================================

grid_system:
  # ============================================================================
  # 基础配置
  # ============================================================================
  exchange: "tradexyz"
  symbol: "NVDA"                    # 🧪 美股测试（自动识别为 XYZ 市场，走 SDK 下单）
  #                                 # 可替换为其他 XYZ 资产如 "TSLA"、"AAPL"、"GOOGL"
  #                                 # 或加密货币 "BTC"、"ETH"（走 ccxt 路径）

  # ----------------------------------------------------------------------------
  # 网格类型：固定范围做多网格
  # ----------------------------------------------------------------------------
  grid_type: "long"

  # ============================================================================
  # 固定范围网格参数
  # ============================================================================
  lower_price: 155.0                 # 🧪 网格下限价格
  upper_price: 195.0                # 🧪 网格上限价格（高于市价的格子会自动跳过，不会变 taker）
  # 网格数量会根据 (upper_price - lower_price) / grid_interval 自动计算

  # ============================================================================
  # 通用网格参数
  # ============================================================================
  grid_interval: 5                # 🧪 每格间隔 $5.0（远大于正常值，避免成交）
  order_amount: 0.2                 # 🧪 最小下单量（NVDA 约 $100，0.1 股 ≈ $10）

  # ----------------------------------------------------------------------------
  # 交易精度配置
  # ----------------------------------------------------------------------------
  quantity_precision: 1              # NVDA 数量精度（XYZ 美股通常 1 位小数）

  # ============================================================================
  # 马丁模式（测试不需要，关闭）
  # ============================================================================
  martingale_increment: 0.0          # 不递增

  # ============================================================================
  # 四重保护配置（测试用，全部关闭）
  # ============================================================================

  # 🎯 剥头皮模式
  scalping_enabled: false            # 🧪 测试关闭
  scalping_trigger_percent: 90
  scalping_take_profit_grids: 2

  # 🛡️ 本金保护模式
  capital_protection_enabled: false   # 🧪 测试关闭
  capital_protection_trigger_percent: 40

  # 💰 止盈模式
  take_profit_enabled: false          # 🧪 测试关闭
  take_profit_percentage: 0.01

  # 🔒 价格锁定模式
  price_lock_enabled: false           # 🧪 测试关闭
  price_lock_threshold: 999999.0      # 设极大值，永不触发
  price_lock_start_at_threshold: false

  # 🎯 反手挂单格子距离
  reverse_order_grid_distance: 1

  # 🔍 订单健康检查间隔
  order_health_check_interval: 60     # 🧪 缩短到 60 秒，方便测试时快速检查
